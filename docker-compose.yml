version: '3.9'

services:
  api:
    build: .
    container_name: equitysaas_api
    ports:
      - '8000:8000'
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: equitysaas_db
    environment:
      POSTGRES_DB: equitysaas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d equitysaas']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: equitysaas_redis
    ports:
      - '6379:6379'
    restart: unless-stopped

volumes:
  pg_data:
